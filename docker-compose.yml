version: '3.8'

services:
  # ==========================================
  # PostgreSQL Database
  # ==========================================
  postgres:
    image: postgres:16-alpine
    container_name: imalat_postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: ${DB_USER:-imalat_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-imalat_pass_2026}
      POSTGRES_DB: ${DB_NAME:-imalat_db}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-imalat_user} -d ${DB_NAME:-imalat_db}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - imalat_network

  # ==========================================
  # Redis (Cache + Queue + Session)
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: imalat_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-imalat_redis_2026}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD:-imalat_redis_2026}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - imalat_network

  # ==========================================
  # MinIO (S3-compatible File Storage)
  # ==========================================
  minio:
    image: minio/minio:latest
    container_name: imalat_minio
    restart: unless-stopped
    ports:
      - '9000:9000'   # API
      - '9001:9001'   # Console
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-imalat_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-imalat_minio_2026}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - imalat_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local

networks:
  imalat_network:
    driver: bridge
